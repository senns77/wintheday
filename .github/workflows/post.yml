name: Auto Blog Post

on:
  schedule:
    - cron: '0 12 * * 2'
    - cron: '0 12 * * 4'
    - cron: '0 12 * * 6'
  workflow_dispatch:

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate-post.js
      - name: Commit and push
        run: |
          git config user.name "Win The Day Bot"
          git config user.email "bot@wintheday.me"
          git add .
          git diff --staged --quiet || git commit -m "Auto post: $(date +'%Y-%m-%d')"
          git push
